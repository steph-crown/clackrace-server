services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: clackrace
      POSTGRES_PASSWORD: clackrace
      POSTGRES_DB: clackrace
    volumes:
      - clackrace_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  clackrace_pg:
